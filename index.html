<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>App Pro</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
font-family:-apple-system;
}

.app{
width:100%;
max-width:414px;
height:100vh;
background:#0d0d12;
color:white;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */
.header{
padding:20px 16px 10px;
font-size:22px;
font-weight:700;
}

/* SEARCH */
.search{
margin:0 16px;
padding:12px;
border-radius:12px;
border:none;
background:#1c1c24;
color:white;
outline:none;
}

/* SCREENS */
.screen{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:none;
flex-direction:column;
background:#0d0d12;
}
.screen.active{
display:flex;
animation:fade .2s;
}
@keyframes fade{
from{opacity:0;transform:translateX(10px)}
to{opacity:1;transform:translateX(0)}
}

/* LIST */
.list{
flex:1;
overflow-y:auto;
}

/* TASK */
.task{
padding:14px 16px;
border-bottom:1px solid #1f1f25;
position:relative;
transition:.2s;
}

.task.swiping{
transform:translateX(-80px);
}

.deleteBtn{
position:absolute;
right:0;
top:0;
height:100%;
width:80px;
background:red;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.priority{
font-size:11px;
font-weight:bold;
}
.alto{color:#ff4d4d}
.medio{color:#ffb84d}
.bajo{color:#4dff88}

.title{font-weight:600}
.desc{font-size:13px;color:#aaa}

/* PANEL */
.panel{
padding:10px 16px;
background:#0d0d12;
}

.input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:12px;
border:none;
background:#1c1c24;
color:white;
outline:none;
}

.btn{
margin-top:8px;
padding:14px;
width:100%;
border-radius:12px;
border:none;
background:#5aa9ff;
font-weight:bold;
transition:.15s;
}
.btn:active{transform:scale(0.96)}

/* NAV */
.nav{
height:60px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #222;
}
.nav div{
opacity:.5;
font-size:20px;
}
.nav .active{
opacity:1;
}

/* MODAL */
.modal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1c1c24;
padding:20px;
border-radius:16px;
display:none;
}
.modal.active{display:block}

</style>
</head>

<body>

<div class="app">

<!-- TAREAS -->
<div id="tasks" class="screen active">
<div class="header">Tareas</div>
<input class="search" placeholder="Buscar..." id="search">

<div id="taskList" class="list"></div>

<div class="panel">
<input id="title" class="input" placeholder="Título">
<input id="desc" class="input" placeholder="Descripción">

<select id="priority" class="input">
<option value="alto">Alta</option>
<option value="medio">Media</option>
<option value="bajo">Baja</option>
</select>

<select id="project" class="input"></select>

<button id="addBtn" class="btn">Añadir</button>
</div>
</div>

<!-- CALENDARIO -->
<div id="calendar" class="screen">
<div class="header">Calendario</div>
<div id="calendarList" class="list"></div>
</div>

<!-- PROYECTOS -->
<div id="projects" class="screen">
<div class="header">Proyectos</div>
<div id="projectList" class="list"></div>

<div class="panel">
<input id="newProject" class="input" placeholder="Nuevo proyecto">
<button id="addProjectBtn" class="btn">Crear</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div data-tab="tasks" class="active">📋</div>
<div data-tab="calendar">📅</div>
<div data-tab="projects">📦</div>
</div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let projects = JSON.parse(localStorage.getItem("projects")) || [];

/* NAV */
document.querySelectorAll(".nav div").forEach(btn=>{
btn.addEventListener("touchstart",()=>switchTab(btn))
btn.addEventListener("click",()=>switchTab(btn))
})

function switchTab(btn){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(btn.dataset.tab).classList.add("active")

document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"))
btn.classList.add("active")
}

/* TASKS */
addBtn.addEventListener("touchstart",addTask)
addBtn.addEventListener("click",addTask)

function addTask(){
if(!title.value) return;

tasks.push({
title:title.value,
desc:desc.value,
priority:priority.value,
project:project.value,
date:new Date().toLocaleDateString()
});

save();
title.value="";
desc.value="";
render();
}

/* SWIPE DELETE */
function createTaskElement(t,i){
let div = document.createElement("div");
div.className="task";

let startX=0;

div.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

div.addEventListener("touchmove",e=>{
let move=e.touches[0].clientX - startX;
if(move < -50){
div.classList.add("swiping");
}
});

div.addEventListener("touchend",()=>{
if(div.classList.contains("swiping")){
tasks.splice(i,1);
save();
render();
}
});

div.innerHTML=`
<div class="priority ${t.priority}">${t.priority}</div>
<div class="title">${t.title}</div>
<div class="desc">${t.desc}</div>
`;

return div;
}

/* RENDER */
function render(){
let list = taskList;
list.innerHTML="";
tasks.forEach((t,i)=>list.appendChild(createTaskElement(t,i)));
renderCalendar();
renderProjects();
renderProjectSelect();
}

/* CALENDAR */
function renderCalendar(){
calendarList.innerHTML="";
let grouped={};

tasks.forEach(t=>{
if(!grouped[t.date]) grouped[t.date]=[];
grouped[t.date].push(t);
});

for(let d in grouped){
calendarList.innerHTML += `<div class="task"><b>${d}</b></div>`;
grouped[d].forEach(t=>{
calendarList.innerHTML += `<div class="task">${t.title}</div>`;
});
}
}

/* PROJECTS */
addProjectBtn.addEventListener("click",()=>{
if(!newProject.value) return;
projects.push(newProject.value);
newProject.value="";
save();
render();
});

function renderProjects(){
projectList.innerHTML="";
projects.forEach((p,i)=>{
let div=document.createElement("div");
div.className="task";
div.textContent=p;

div.addEventListener("click",()=>{
projects.splice(i,1);
save();
render();
});

projectList.appendChild(div);
});
}

function renderProjectSelect(){
project.innerHTML="";
projects.forEach(p=>{
project.innerHTML += `<option>${p}</option>`;
});
}

/* SEARCH */
search.addEventListener("input",()=>{
let q=search.value.toLowerCase();
let filtered=tasks.filter(t=>t.title.toLowerCase().includes(q));
taskList.innerHTML="";
filtered.forEach((t,i)=>taskList.appendChild(createTaskElement(t,i)));
});

/* SAVE */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("projects",JSON.stringify(projects));
}

render();
</script>

</body>
</html>
