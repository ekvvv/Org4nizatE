<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Pro</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #000;
    display: flex;
    justify-content: center;
}

/* CONTENEDOR IPHONE */
.app {
    width: 100%;
    max-width: 414px;
    min-height: 100vh;
    background: #0d0d12;
    color: white;
}

/* HEADER */
.header {
    padding: 20px 16px 10px;
    font-size: 22px;
    font-weight: bold;
}

/* SEARCH */
.search {
    margin: 0 16px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    width: calc(100% - 32px);
    background: #1c1c24;
    color: white;
}

/* TASK */
.task {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid #1f1f25;
}

.task img {
    width: 48px;
    height: 48px;
    border-radius: 10px;
}

.task-content {
    flex: 1;
}

.priority {
    font-size: 11px;
    font-weight: bold;
    opacity: 0.7;
}

.alto { color: #ff4d4d; }
.medio { color: #ffb84d; }
.bajo { color: #4dff88; }

.title {
    font-size: 15px;
    font-weight: 600;
}

.desc {
    font-size: 13px;
    color: #aaa;
}

/* PANEL */
.panel {
    padding: 16px;
}

.input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 12px;
    border: none;
    background: #1c1c24;
    color: white;
}

.btn {
    margin-top: 10px;
    padding: 14px;
    width: 100%;
    border-radius: 12px;
    border: none;
    background: #5aa9ff;
    font-weight: bold;
}

/* NAV */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 414px;
    background: #111;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    border-top: 1px solid #222;
}

.nav div {
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="app">

    <div class="header">Tareas de hoy</div>

    <input class="search" placeholder="Buscar...">

    <div id="taskList"></div>

    <div class="panel">
        <input id="title" class="input" placeholder="Título">
        <input id="desc" class="input" placeholder="Descripción">

        <select id="priority" class="input">
            <option value="alto">Alta</option>
            <option value="medio">Media</option>
            <option value="bajo">Baja</option>
        </select>

        <button class="btn" onclick="addTask()">Añadir</button>
    </div>

</div>

<div class="nav">
    <div>📋</div>
    <div>📅</div>
    <div>📦</div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function addTask() {
    let t = {
        title: document.getElementById("title").value,
        desc: document.getElementById("desc").value,
        priority: document.getElementById("priority").value
    };

    if (!t.title) return;

    tasks.push(t);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    renderTasks();
}

function renderTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((t, i) => {
        list.innerHTML += `
        <div class="task">
            <img src="https://picsum.photos/60?random=${i}">
            <div class="task-content">
                <div class="priority ${t.priority}">${t.priority.toUpperCase()}</div>
                <div class="title">${t.title}</div>
                <div class="desc">${t.desc}</div>
            </div>
        </div>`;
    });
}

renderTasks();
</script>

</body>
</html>
