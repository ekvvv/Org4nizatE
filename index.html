<div class="app">
    <style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #0d0d12;
    color: white;
    display: flex;
    justify-content: center;
}

/* CONTENEDOR TIPO iPHONE */
.app {
    width: 100%;
    max-width: 414px;
    min-height: 100vh;
    background: #0d0d12;
    position: relative;
}

/* HEADER */
.header {
    padding: 20px 16px 10px;
}

.header h1 {
    font-size: 22px;
    margin: 0;
}

/* SEARCH */
.search-box {
    padding: 0 16px;
}

.search {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #1c1c24;
    color: white;
}

/* TASK LIST */
.task-list {
    margin-top: 10px;
}

/* CARD */
.task {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid #1f1f25;
}

.task img {
    width: 48px;
    height: 48px;
    border-radius: 10px;
}

.task-content {
    flex: 1;
}

.priority {
    font-size: 11px;
    font-weight: bold;
    opacity: 0.7;
}

.alto { color: #ff4d4d; }
.medio { color: #ffb84d; }
.bajo { color: #4dff88; }

.title {
    font-size: 15px;
    font-weight: 600;
}

.desc {
    font-size: 13px;
    color: #aaa;
}

/* INPUT PANEL */
.panel {
    position: sticky;
    bottom: 60px;
    background: #0d0d12;
    padding: 12px 16px;
}

.input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 12px;
    border: none;
    background: #1c1c24;
    color: white;
}

.btn {
    margin-top: 10px;
    padding: 14px;
    width: 100%;
    border-radius: 12px;
    border: none;
    background: #5aa9ff;
    font-weight: bold;
}

/* NAV BAR */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 414px;
    background: #111;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    border-top: 1px solid #222;
}

.nav div {
    font-size: 12px;
    text-align: center;
    color: #aaa;
}
</style>
</div>
